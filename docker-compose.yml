services:
  wc2026:
    build: .
    container_name: wc2026-ai
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # 本站預設「無密碼、公開」。若要自架時加上登入密碼，取消下行註解並填入你自己的密碼。
      # 注意：YAML 會把 $$ 解析成一個 $，密碼若含 $ 字元請自行加倍跳脫。
      # SITE_PASSWORD: "請改成你自己的密碼"
      PORT: "5000"
    # 將預測資料夾掛載出來，方便用排程腳本更新後即時生效（可選）
    volumes:
      - ./site/data:/app/site/data:ro
