services:
  wc2026:
    build: .
    container_name: wc2026-ai
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # 登入密碼（請改成你自己的）
      SITE_PASSWORD: "TN$$$$$$$$$$$$$$$$"
      PORT: "5000"
    # 將預測資料夾掛載出來，方便用排程腳本更新後即時生效（可選）
    volumes:
      - ./site/data:/app/site/data:ro
