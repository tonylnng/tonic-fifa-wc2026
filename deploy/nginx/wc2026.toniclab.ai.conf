# 世界盃 2026 — Nginx 反向代理設定
# 放到 /etc/nginx/sites-available/wc2026.toniclab.ai.conf
# 再 ln -s 到 sites-enabled/，certbot 會自動補上 HTTPS 區塊。
#
# 安裝步驟見 deploy/自動部署說明.md 的「Nginx + Certbot」一節。

server {
    listen 80;
    listen [::]:80;
    server_name wc2026.toniclab.ai;

    # 反向代理到本機容器（docker-compose 對外 5000 埠）
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # （可選）GitHub webhook：若用方案 A 且想共用 443，
    # 取消註解把 /gh-webhook 代理到本機 webhook 監聽器（9000 埠）。
    # location /gh-webhook {
    #     proxy_pass http://127.0.0.1:9000/webhook;
    #     proxy_set_header Host $host;
    # }
}

# 執行 certbot 後，它會自動：
#  - 新增一個 listen 443 ssl 的 server 區塊（含憑證路徑）
#  - 把上面的 listen 80 區塊改成 301 轉址到 https
# 因此你不需要手寫 SSL 區塊。
