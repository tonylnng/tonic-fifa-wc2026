<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif" role="img" aria-label="世界盃 2026 AI 預測中心系統架構圖：雲端工作區、GitHub、Docker 伺服器與 Notion 的互動">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="github" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="server" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="notion" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1f5f9"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="960" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="44" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="700">世界盃 2026 AI 預測中心 — 系統架構</text>
  <text x="480" y="70" text-anchor="middle" fill="#94a3b8" font-size="14">雲端工作區產生預測 · GitHub 中轉資料 · Docker 伺服器展示 · Notion 同步追蹤</text>

  <!-- ===== Connection paths (drawn before nodes so particles sit above) ===== -->
  <!-- Workspace -> GitHub (push data) -->
  <path id="p1" d="M 300 215 C 400 215, 420 215, 478 215" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- GitHub -> Server (pull) -->
  <path id="p2" d="M 660 240 C 720 290, 720 330, 720 392" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- Server -> GitHub (webhook/timer poll, dashed) -->
  <path id="p2b" d="M 690 392 C 660 340, 560 270, 540 248" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <!-- Workspace -> Notion (sync) -->
  <path id="p3" d="M 200 270 C 200 360, 200 420, 250 470" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===== Flowing data particles ===== -->
  <circle r="5" fill="#a78bfa" filter="url(#glow)">
    <animateMotion dur="2.4s" repeatCount="indefinite" rotate="auto"><mpath href="#p1"/></animateMotion>
  </circle>
  <circle r="5" fill="#a78bfa" filter="url(#glow)">
    <animateMotion dur="2.4s" begin="1.2s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion>
  </circle>
  <circle r="5" fill="#22d3ee" filter="url(#glow)">
    <animateMotion dur="2.6s" repeatCount="indefinite"><mpath href="#p2"/></animateMotion>
  </circle>
  <circle r="5" fill="#22d3ee" filter="url(#glow)">
    <animateMotion dur="2.6s" begin="1.3s" repeatCount="indefinite"><mpath href="#p2"/></animateMotion>
  </circle>
  <circle r="3.5" fill="#64748b">
    <animateMotion dur="3.2s" repeatCount="indefinite"><mpath href="#p2b"/></animateMotion>
  </circle>
  <circle r="5" fill="#c084fc" filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite"><mpath href="#p3"/></animateMotion>
  </circle>
  <circle r="5" fill="#c084fc" filter="url(#glow)">
    <animateMotion dur="3s" begin="1.5s" repeatCount="indefinite"><mpath href="#p3"/></animateMotion>
  </circle>

  <!-- Path labels -->
  <text x="388" y="205" text-anchor="middle" fill="#cbd5e1" font-size="12.5">push data/</text>
  <text x="760" y="320" fill="#cbd5e1" font-size="12.5">git pull</text>
  <text x="560" y="305" text-anchor="end" fill="#64748b" font-size="11.5">webhook / 輪詢偵測</text>
  <text x="150" y="375" text-anchor="middle" fill="#cbd5e1" font-size="12.5">同步預測</text>

  <!-- ===== NODE: Cloud Workspace ===== -->
  <g>
    <rect x="40" y="150" width="260" height="120" rx="16" fill="url(#cloud)" filter="url(#glow)"/>
    <rect x="40" y="150" width="260" height="120" rx="16" fill="none" stroke="#a78bfa" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="62" y="184" fill="#fff" font-size="17" font-weight="700">☁ 雲端工作區</text>
    <text x="62" y="206" fill="#ede9fe" font-size="12.5">Perplexity 預測引擎</text>
    <text x="62" y="226" fill="#ddd6fe" font-size="11.5">· 研究 ≥50 來源 → X:X 預測 + 理由</text>
    <text x="62" y="244" fill="#ddd6fe" font-size="11.5">· 算準確率 · 重新發布 pplx.app</text>
    <!-- pulsing schedule chip -->
    <g>
      <rect x="62" y="252" width="180" height="9" rx="4.5" fill="#312e81"/>
      <rect x="62" y="252" width="180" height="9" rx="4.5" fill="#a78bfa">
        <animate attributeName="width" values="0;180;0" dur="4s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
  <!-- schedule badge for workspace -->
  <g transform="translate(40,118)">
    <rect x="0" y="0" width="200" height="24" rx="12" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
    <circle cx="14" cy="12" r="4" fill="#22c55e"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/></circle>
    <text x="26" y="16" fill="#c7d2fe" font-size="11.5">⏱ 每 8 小時 · 16 強起每 4 小時</text>
  </g>

  <!-- ===== NODE: GitHub ===== -->
  <g>
    <rect x="480" y="150" width="200" height="100" rx="16" fill="url(#github)" filter="url(#glow)"/>
    <rect x="480" y="150" width="200" height="100" rx="16" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <text x="580" y="186" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">⎇ GitHub</text>
    <text x="580" y="208" text-anchor="middle" fill="#cbd5e1" font-size="12">tonylnng/tonic-fifa-wc2026</text>
    <text x="580" y="228" text-anchor="middle" fill="#94a3b8" font-size="11.5">資料中轉站（data/）</text>
  </g>

  <!-- ===== NODE: Docker Server ===== -->
  <g>
    <rect x="560" y="392" width="320" height="150" rx="16" fill="url(#server)" filter="url(#glow)"/>
    <rect x="560" y="392" width="320" height="150" rx="16" fill="none" stroke="#67e8f9" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3.4s" repeatCount="indefinite"/>
    </rect>
    <text x="582" y="426" fill="#fff" font-size="17" font-weight="700">🐳 你的 Docker 伺服器</text>
    <text x="582" y="448" fill="#cffafe" font-size="12.5">OpenClaw 安裝 · wc2026.toniclab.ai</text>
    <!-- inner boxes -->
    <rect x="582" y="460" width="132" height="64" rx="8" fill="#155e75" stroke="#22d3ee" stroke-width="1"/>
    <text x="648" y="482" text-anchor="middle" fill="#e0f2fe" font-size="11.5" font-weight="600">Nginx + Certbot</text>
    <text x="648" y="500" text-anchor="middle" fill="#a5f3fc" font-size="10.5">HTTPS 反向代理</text>
    <text x="648" y="516" text-anchor="middle" fill="#a5f3fc" font-size="10.5">→ 127.0.0.1:5000</text>
    <rect x="726" y="460" width="132" height="64" rx="8" fill="#155e75" stroke="#22d3ee" stroke-width="1"/>
    <text x="792" y="482" text-anchor="middle" fill="#e0f2fe" font-size="11.5" font-weight="600">wc2026-ai 容器</text>
    <text x="792" y="500" text-anchor="middle" fill="#a5f3fc" font-size="10.5">Express + React</text>
    <text x="792" y="516" text-anchor="middle" fill="#a5f3fc" font-size="10.5">port 5000</text>
  </g>
  <!-- schedule badge for server -->
  <g transform="translate(560,556)">
    <rect x="0" y="0" width="320" height="24" rx="12" fill="#083344" stroke="#0891b2" stroke-width="1"/>
    <circle cx="14" cy="12" r="4" fill="#22c55e"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
    <text x="26" y="16" fill="#a5f3fc" font-size="11.5">⏱ 定時任務：webhook 即時 ／ systemd timer 每 5 分鐘輪詢</text>
  </g>

  <!-- ===== NODE: Notion ===== -->
  <g>
    <rect x="80" y="470" width="240" height="92" rx="16" fill="url(#notion)" filter="url(#glow)"/>
    <rect x="80" y="470" width="240" height="92" rx="16" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="102" y="504" fill="#0f172a" font-size="17" font-weight="700">📓 Notion</text>
    <text x="102" y="526" fill="#334155" font-size="12">世界盃 2026 AI 預測追蹤</text>
    <text x="102" y="546" fill="#475569" font-size="11.5">每輪由工作區同步新預測頁面</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40,300)" font-size="11.5">
    <text x="0" y="0" fill="#64748b">圖例：</text>
    <circle cx="50" cy="-4" r="4" fill="#a78bfa"/><text x="60" y="0" fill="#94a3b8">資料推送</text>
    <circle cx="135" cy="-4" r="4" fill="#22d3ee"/><text x="145" y="0" fill="#94a3b8">資料拉取</text>
    <circle cx="220" cy="-4" r="3.5" fill="#64748b"/><text x="230" y="0" fill="#94a3b8">偵測輪詢（虛線）</text>
  </g>
</svg>
